# Eval case schema — code-generation stage (/opsx-apply per-task gate)

stage: code-generation
artifact: generated or modified code in fork working copy (after OAPE command or manual agent work)
stage_eval_file: evals/baseline/evals/code-generation/code-generation_eval.yaml
forward_eval_file: schemas/openspec-agile-workflow/evals/code-generation_eval.yaml

description: >-
  Scores generated code per task during /opsx-apply. Cases are tagged with
  oape_command so only relevant evals run for the current task. Authored
  retrospectively by /eval-loop from EPs, PRs, and bug postmortems.

consolidated_schema:
  stage: code-generation
  artifact: fork working copy (code + tests)
  version: 1
  eval_count: <N>
  oape_commands:
    - api-generate
    - api-generate-tests
    - api-implement
    - e2e-generate
    - manual
  evals: [<case>, ...]

required_fields:
  - id
  - round
  - stage
  - oape_command
  - source_issue_ids
  - input_refs
  - prompt
  - assertions
  - scoring

oape_command_values:
  api-generate: API type / CRD generation tasks
  api-generate-tests: .testsuite.yaml / API integration test tasks
  api-implement: Controller / operator reconciliation tasks
  e2e-generate: E2E test artifact tasks
  manual: ManifestsBindata, RBAC, OLM, Docs, WebhookTLS agents (no OAPE command)

assertion_types:
  - must_use_pattern
  - must_not_use
  - must_pass_make_targets
  - must_match_task_payload
  - files_must_exist
  - files_must_not_exist
  - must_follow_constitution
  - must_follow_effective_go
  - must_include_tests
  - must_not_violate_non_goals

filter_rule_forward: >-
  During /opsx-apply, load evals/code-generation_eval.yaml and score only cases
  where oape_command matches the resolved command for the current task (use
  manual when no OAPE command). Always include cases with oape_command: any if present.

example:
  id: eval-r001-codegen-001
  round: 1
  stage: code-generation
  oape_command: api-implement
  source_issue_ids: [PROJ-123]
  patterns: [PAT-001]
  input_refs:
    - evals/inputs/05-repo-prs.md
    - evals/inputs/bugs/PROJ-123.md
  prompt: |
    Controller reconciliation must follow the established pattern for status updates.
  assertions:
    must_use_pattern:
      - ReconcileResult
    must_not_use:
      - client.Create
      - client.Update
    must_pass_make_targets:
      - make test
    must_match_task_payload: true
  scoring:
    method: weighted_checklist
    pass_threshold: 85
